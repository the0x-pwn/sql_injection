<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <radialGradient id="wbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a1f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="url(#wbg)"/>
  <ellipse cx="150" cy="110" rx="60" ry="70" fill="rgba(6,182,212,0.07)"/>
  <!-- strap top -->
  <rect x="127" y="20" width="46" height="50" rx="8" fill="#1a1a2e"/>
  <line x1="133" y1="30" x2="167" y2="30" stroke="#2d2d4e" stroke-width="2"/>
  <line x1="133" y1="38" x2="167" y2="38" stroke="#2d2d4e" stroke-width="2"/>
  <line x1="133" y1="46" x2="167" y2="46" stroke="#2d2d4e" stroke-width="2"/>
  <!-- watch body -->
  <rect x="105" y="65" width="90" height="90" rx="22" fill="#111118" stroke="url(#wg1)" stroke-width="2.5"/>
  <!-- screen -->
  <rect x="113" y="73" width="74" height="74" rx="16" fill="#0a0a1a"/>
  <!-- screen content -->
  <text x="150" y="100" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="monospace">10:42</text>
  <line x1="150" y1="105" x2="150" y2="120" stroke="url(#wg1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="150" y1="105" x2="162" y2="113" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="150" cy="105" r="2" fill="white"/>
  <!-- heart rate line -->
  <polyline points="120,135 128,135 132,128 136,142 140,132 144,138 148,135 156,135" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <!-- crown button -->
  <rect x="195" y="90" width="8" height="20" rx="4" fill="#2d2d4e" stroke="url(#wg1)" stroke-width="1"/>
  <!-- strap bottom -->
  <rect x="127" y="150" width="46" height="50" rx="8" fill="#1a1a2e"/>
  <line x1="133" y1="162" x2="167" y2="162" stroke="#2d2d4e" stroke-width="2"/>
  <line x1="133" y1="170" x2="167" y2="170" stroke="#2d2d4e" stroke-width="2"/>
  <circle cx="150" cy="185" r="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
</svg>