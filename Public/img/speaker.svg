<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <radialGradient id="sbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1a1f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="url(#sbg)"/>
  <!-- glow rings (sound waves) -->
  <circle cx="150" cy="110" r="85" fill="none" stroke="rgba(124,58,237,0.06)" stroke-width="1"/>
  <circle cx="150" cy="110" r="70" fill="none" stroke="rgba(124,58,237,0.08)" stroke-width="1"/>
  <circle cx="150" cy="110" r="55" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="1"/>
  <!-- body cylinder -->
  <rect x="80" y="65" width="140" height="90" rx="45" fill="#141420" stroke="#2a2a3e" stroke-width="2"/>
  <!-- grille dots pattern -->
  <g fill="#2a2a3e">
    <circle cx="108" cy="90" r="3"/><circle cx="120" cy="90" r="3"/><circle cx="132" cy="90" r="3"/>
    <circle cx="144" cy="90" r="3"/><circle cx="156" cy="90" r="3"/><circle cx="168" cy="90" r="3"/>
    <circle cx="180" cy="90" r="3"/><circle cx="192" cy="90" r="3"/>
    <circle cx="102" cy="102" r="3"/><circle cx="114" cy="102" r="3"/><circle cx="126" cy="102" r="3"/>
    <circle cx="138" cy="102" r="3"/><circle cx="150" cy="102" r="3"/><circle cx="162" cy="102" r="3"/>
    <circle cx="174" cy="102" r="3"/><circle cx="186" cy="102" r="3"/><circle cx="198" cy="102" r="3"/>
    <circle cx="108" cy="114" r="3"/><circle cx="120" cy="114" r="3"/><circle cx="132" cy="114" r="3"/>
    <circle cx="144" cy="114" r="3"/><circle cx="156" cy="114" r="3"/><circle cx="168" cy="114" r="3"/>
    <circle cx="180" cy="114" r="3"/><circle cx="192" cy="114" r="3"/>
    <circle cx="114" cy="126" r="3"/><circle cx="126" cy="126" r="3"/><circle cx="138" cy="126" r="3"/>
    <circle cx="150" cy="126" r="3"/><circle cx="162" cy="126" r="3"/><circle cx="174" cy="126" r="3"/>
    <circle cx="186" cy="126" r="3"/>
  </g>
  <!-- center woofer -->
  <circle cx="150" cy="110" r="28" fill="#0d0d18" stroke="url(#sg1)" stroke-width="2"/>
  <circle cx="150" cy="110" r="20" fill="#111118" stroke="#2a2a3e" stroke-width="1"/>
  <circle cx="150" cy="110" r="12" fill="#141420"/>
  <circle cx="150" cy="110" r="5" fill="url(#sg1)" opacity="0.6"/>
  <!-- LED strip -->
  <rect x="82" y="148" width="136" height="4" rx="2" fill="url(#sg1)" opacity="0.5"/>
  <!-- buttons -->
  <circle cx="94" cy="80" r="7" fill="#1e1e30" stroke="#2a2a3e" stroke-width="1"/>
  <text x="94" y="84" text-anchor="middle" fill="#a78bfa" font-size="8">+</text>
  <circle cx="206" cy="80" r="7" fill="#1e1e30" stroke="#2a2a3e" stroke-width="1"/>
  <text x="206" y="84" text-anchor="middle" fill="#a78bfa" font-size="8">−</text>
</svg>