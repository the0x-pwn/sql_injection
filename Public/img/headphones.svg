<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <radialGradient id="hbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1030"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="url(#hbg)"/>
  <!-- glow -->
  <ellipse cx="150" cy="110" rx="80" ry="60" fill="rgba(124,58,237,0.12)"/>
  <!-- headband arc -->
  <path d="M 80 130 Q 150 40 220 130" stroke="url(#hg1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- left cup -->
  <rect x="62" y="118" width="36" height="50" rx="18" fill="#1e1030" stroke="url(#hg1)" stroke-width="2"/>
  <rect x="70" y="126" width="20" height="34" rx="10" fill="#2d1b69" opacity="0.8"/>
  <circle cx="80" cy="143" r="6" fill="url(#hg1)" opacity="0.6"/>
  <!-- right cup -->
  <rect x="202" y="118" width="36" height="50" rx="18" fill="#1e1030" stroke="url(#hg1)" stroke-width="2"/>
  <rect x="210" y="126" width="20" height="34" rx="10" fill="#2d1b69" opacity="0.8"/>
  <circle cx="220" cy="143" r="6" fill="url(#hg1)" opacity="0.6"/>
  <!-- cable -->
  <path d="M 150 185 Q 150 200 160 205" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- reflection dots -->
  <circle cx="100" cy="70" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="200" cy="65" r="1.5" fill="#06b6d4" opacity="0.4"/>
</svg>